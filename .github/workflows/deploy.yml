name: 程序部署

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: registry.cn-beijing.aliyuncs.com/xxdl_work/${{ github.event.repository.name }}:latest
  CONTAINER_NAME: ${{ github.event.repository.name }}

jobs:
  deploy-gate:
    name: 判断是否需要部署
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check commit message
        id: check
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MESSAGE" == *"部署"* ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: 构建并推送镜像
    needs: deploy-gate
    if: needs.deploy-gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 部署到服务器
    needs:
      - deploy-gate
      - build-push
    if: needs.deploy-gate.outputs.enabled == 'true' && needs.build-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST_ONE }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            sudo mkdir -p /opt/docker/${{ env.CONTAINER_NAME }}/data
            sudo chown -R 1001:1001 /opt/docker/${{ env.CONTAINER_NAME }}/data

            echo "${{ secrets.ALIYUN_PASSWORD }}" | sudo docker login registry.cn-beijing.aliyuncs.com \
              -u "${{ secrets.ALIYUN_USERNAME }}" \
              --password-stdin

            sudo docker pull ${{ env.IMAGE_NAME }}
            sudo docker stop ${{ env.CONTAINER_NAME }} || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true

            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ vars.EXT_PORT }}:3000 \
              -e TZ=Asia/Shanghai \
              -v /opt/docker/${{ env.CONTAINER_NAME }}/data:/app/data \
              -e NUXT_SESSION_PASSWORD="${{ secrets.NUXT_SESSION_PASSWORD }}" \
              -e DOWNLOAD_URL_EXPIRES_SECONDS="${{ vars.DOWNLOAD_URL_EXPIRES_SECONDS }}" \
              -e UPDATE_TOKEN_REQUIRED="${{ vars.UPDATE_TOKEN_REQUIRED }}" \
              -e FILE_UPDATE_TOKEN_REQUIRED="${{ vars.FILE_UPDATE_TOKEN_REQUIRED }}" \
              -e CI_API_TOKEN="${{ secrets.CI_API_TOKEN }}" \
              ${{ env.IMAGE_NAME }}

            sudo rm -f ~/.docker/config.json

  notify:
    name: 发送部署通知
    if: always() && (needs.deploy-gate.outputs.enabled == 'true' || contains(github.event.head_commit.message, '部署'))
    needs:
      - deploy-gate
      - build-push
      - deploy
    runs-on: ubuntu-latest
    steps:
      - name: Build notification content
        id: message
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          build_result="${{ needs.build-push.result }}"
          deploy_result="${{ needs.deploy.result }}"

          label_result() {
            case "$1" in
              success) echo "成功" ;;
              failure) echo "失败" ;;
              cancelled) echo "已取消" ;;
              skipped) echo "未执行" ;;
              *) echo "$1" ;;
            esac
          }

          build_label="$(label_result "$build_result")"
          deploy_label="$(label_result "$deploy_result")"

          if [ "$build_result" = "success" ] && [ "$deploy_result" = "success" ]; then
            title="🟢 ${{ github.event.repository.name }} 部署成功"
            status="成功"
            reason="镜像构建和服务器部署均已完成。"
          elif [ "$build_result" = "cancelled" ] || [ "$deploy_result" = "cancelled" ]; then
            title="🟡 ${{ github.event.repository.name }} 部署已取消"
            status="已取消"
            reason="工作流被取消，未完成部署。"
          elif [ "$build_result" != "success" ]; then
            title="🔴 ${{ github.event.repository.name }} 部署失败"
            status="失败"
            reason="镜像构建未成功，服务器部署未执行。"
          else
            title="🔴 ${{ github.event.repository.name }} 部署失败"
            status="失败"
            reason="镜像构建成功，但服务器部署未成功。"
          fi

          {
            echo "title=$title"
            echo "desp<<EOF"
            echo "部署状态：$status"
            echo "状态说明：$reason"
            echo "构建结果：$build_label ($build_result)"
            echo "部署结果：$deploy_label ($deploy_result)"
            echo "分支：${{ github.ref_name }}"
            echo "提交：${{ github.sha }}"
            echo "提交信息：$COMMIT_MESSAGE"
            echo "触发人：${{ github.actor }}"
            echo "查看详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send notification
        uses: easychen/github-action-server-chan@v1.0.0
        with:
          sendkey: ${{ secrets.SENDKEY }}
          title: ${{ steps.message.outputs.title }}
          desp: ${{ steps.message.outputs.desp }}
