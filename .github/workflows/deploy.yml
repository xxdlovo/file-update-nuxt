name: 程序部署

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: registry.cn-beijing.aliyuncs.com/xxdl_work/${{ github.event.repository.name }}:latest
  CONTAINER_NAME: ${{ github.event.repository.name }}

jobs:
  build-push:
    name: 构建并推送镜像
    if: contains(github.event.head_commit.message, '部署')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 部署到服务器
    if: contains(github.event.head_commit.message, '部署')
    needs: build-push
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            sudo mkdir -p /opt/docker/${{ env.CONTAINER_NAME }}/data

            echo "${{ secrets.ALIYUN_PASSWORD }}" | sudo docker login registry.cn-beijing.aliyuncs.com \
              -u "${{ secrets.ALIYUN_USERNAME }}" \
              --password-stdin

            sudo docker pull ${{ env.IMAGE_NAME }}
            sudo docker stop ${{ env.CONTAINER_NAME }} || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true

            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ vars.EXT_PORT }}:3000 \
              -v /opt/docker/${{ env.CONTAINER_NAME }}/data:/app/data \
              -e NUXT_SESSION_PASSWORD="${{ secrets.NUXT_SESSION_PASSWORD }}" \
              -e DOWNLOAD_URL_EXPIRES_SECONDS="${{ vars.DOWNLOAD_URL_EXPIRES_SECONDS }}" \
              -e UPDATE_TOKEN_REQUIRED="${{ vars.UPDATE_TOKEN_REQUIRED }}" \
              -e FILE_UPDATE_TOKEN_REQUIRED="${{ vars.FILE_UPDATE_TOKEN_REQUIRED }}" \
              -e CI_API_TOKEN_SHA256="${{ secrets.CI_API_TOKEN_SHA256 }}" \
              ${{ env.IMAGE_NAME }}

            sudo rm -f ~/.docker/config.json

  notify:
    name: 发送部署通知
    if: always() && contains(github.event.head_commit.message, '部署')
    needs:
      - build-push
      - deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: needs.build-push.result == 'success' && needs.deploy.result == 'success'
        uses: easychen/github-action-server-chan@v1.0.0
        with:
          sendkey: ${{ secrets.sendkey }}
          title: "🟢 ${{ github.event.repository.name }} 部署成功"
          desp: |
            部署状态：成功
            构建结果：${{ needs.build-push.result }}
            部署结果：${{ needs.deploy.result }}
            分支：${{ github.ref_name }}
            提交：${{ github.sha }}
            提交信息：${{ github.event.head_commit.message }}
            触发人：${{ github.actor }}
            查看详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify failure
        if: needs.build-push.result != 'success' || needs.deploy.result != 'success'
        uses: easychen/github-action-server-chan@v1.0.0
        with:
          sendkey: ${{ secrets.sendkey }}
          title: "🔴 ${{ github.event.repository.name }} 部署失败"
          desp: |
            部署状态：失败
            构建结果：${{ needs.build-push.result }}
            部署结果：${{ needs.deploy.result }}
            分支：${{ github.ref_name }}
            提交：${{ github.sha }}
            提交信息：${{ github.event.head_commit.message }}
            触发人：${{ github.actor }}
            查看详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
